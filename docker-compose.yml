version: "3.8"

services:
  spark-iceberg:
    build: .
    container_name: spark-iceberg
    depends_on:
      - rest
      - minio
      - mc
    volumes:
      - ./warehouse:/home/iceberg/warehouse
      - .:/home/iceberg/notebooks
      - ./notebooks/data:/home/iceberg/data
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_S3_PATH_STYLE_ACCESS=true
    ports:
      - "8888:8888"   # Jupyter
      - "8080:8080"   # Spark Master UI
      - "10000:10000" # Thrift Server
    networks:
      - iceberg_net

  rest:
    image: apache/iceberg-rest-fixture
    container_name: iceberg-rest
    networks:
      - iceberg_net
    ports:
      - "8181:8181"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/wh/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_PATH_STYLE_ACCESS=true
      - CATALOG_S3_PATH__STYLE__ACCESS=true

  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio
    ports:
      - "9001:9001" # MinIO Console
      - "9000:9000" # MinIO API
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data

  mc:
    image: minio/mc
    container_name: mc
    depends_on:
      - minio
    networks:
      - iceberg_net
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/warehouse --ignore-existing;
      exit 0;
      "

networks:
  iceberg_net:

volumes:
  minio_data:
